name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            backend: OpenGL
            name: Linux OpenGL
          - os: ubuntu-22.04
            backend: Vulkan
            name: Linux Vulkan
          - os: windows-latest
            backend: OpenGL
            name: Windows OpenGL
          - os: windows-latest
            backend: Vulkan
            name: Windows Vulkan

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libvulkan-dev

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux' && matrix.backend == 'Vulkan'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -q
          sudo apt-get install -y vulkan-sdk

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows' && matrix.backend == 'Vulkan'
        shell: pwsh
        run: |
          $version = "1.4.304.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          .\VulkanSDK.exe --accept-licenses --default-answer --confirm-command install
          $sdkPath = "C:\VulkanSDK\$version"
          echo "VULKAN_SDK=$sdkPath" | Out-File -Append -FilePath $env:GITHUB_ENV
          "$sdkPath\Bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Configure
        run: cmake -B build -DVEX_BACKEND=${{ matrix.backend }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel
